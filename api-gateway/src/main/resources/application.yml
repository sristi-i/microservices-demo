server:
  port: 8999

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/users/**

            - id: restaurant-service
              uri: lb://restaurant-service
              predicates:
                - Path=/restaurants/**

            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/orders/**

eureka:
  instance:
    hostname: localhost
    prefer-ip-address: false
    ip-address: 127.0.0.1
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/